name: Build and Push Tencent TCR Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: marmo-sam-gpu
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_NAMESPACE: fastsam
  MODEL_BASE_URL: https://www.marmoai.cn/models/fastsam

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Compute tag
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Download model assets
        run: |
          curl -fL --retry 3 --retry-delay 5 \
            -o fastsam-backend/FastSAM-x.pt \
            "${MODEL_BASE_URL}/FastSAM-x.pt"
          curl -fL --retry 3 --retry-delay 5 \
            -o fastsam-backend/sam_b.pt \
            "${MODEL_BASE_URL}/sam_b.pt"

      - name: Build and push image to Tencent TCR
        uses: docker/build-push-action@v6
        with:
          context: ./fastsam-backend
          file: ./fastsam-backend/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}

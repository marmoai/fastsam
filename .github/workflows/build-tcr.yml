name: Build and Push Tencent TCR Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: marmo-sam-gpu
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_NAMESPACE: fastsam

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Compute tag
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and load image locally
        uses: docker/build-push-action@v6
        with:
          context: ./fastsam-backend
          file: ./fastsam-backend/Dockerfile
          load: true
          provenance: false
          sbom: false
          tags: local/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}

      - name: Push sha tag to Tencent TCR
        run: |
          docker tag local/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }} ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
          docker push ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}

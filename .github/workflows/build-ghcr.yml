name: Build and Push Tencent TCR Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: marmo-sam-gpu
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_NAMESPACE: fastsam

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Extract metadata for Tencent TCR
        id: meta_tcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./fastsam-backend
          file: ./fastsam-backend/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta_tcr.outputs.tags }}
          labels: ${{ steps.meta_tcr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

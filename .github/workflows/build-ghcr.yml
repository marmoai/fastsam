name: Build and Publish Container Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: marmo-sam-gpu
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_NAMESPACE: fastsam

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./fastsam-backend
          file: ./fastsam-backend/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Copy latest image to Tencent TCR
        run: |
          skopeo copy --retry-times 5 \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ secrets.TCR_USERNAME }}:${{ secrets.TCR_PASSWORD }}" \
            docker://ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest \
            docker://${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

      - name: Copy sha tag to Tencent TCR
        run: |
          skopeo copy --retry-times 5 \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ secrets.TCR_USERNAME }}:${{ secrets.TCR_PASSWORD }}" \
            docker://ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }} \
            docker://${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
